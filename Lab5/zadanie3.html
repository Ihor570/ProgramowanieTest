<!DOCTYPE html>

<body>
    <script>
        function ciag_Fibonacciego(n) {
            let tablica = [];
            if (n >= 1) tablica.push(0);
            if (n >= 2) tablica.push(1);
            
            for (let i = 2; i < n; i++) {
                tablica.push(tablica[i - 1] + tablica[i - 2]);
            }
            console.log(tablica);
        }
        
        ciag_Fibonacciego(10);
    </script>
</body>
</html>
