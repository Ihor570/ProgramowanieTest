<body>
    <script>
        function rysuj_Choinke(n) {
            for (let i = 0; i < n; i++) {
                let spacje = " ".repeat(n - i - 1);
                let gwiazdki = "*".repeat(2 * i + 1);
                console.log(spacje + gwiazdki);
            }
        }
        
        rysuj_Choinke(5);
    </script>
