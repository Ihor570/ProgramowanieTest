    <script>
        function wypisz_Parzyste(a, b) {
            let tablica = [];
            for (let i = a; i <= b; i++) {
                if (i % 2 === 0) {
                    tablica.push(i);
                }
            }
            console.log(tablica);
        }
        
        wypisz_Parzyste(2, 20);
    </script>
