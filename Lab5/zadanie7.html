<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 7</title>
</head>
<body>
    <script>
        function Szesnastkowy(liczba) {
            if (liczba === 0) {
                console.log("0");
                return;
            }
            
            let znaki = "0123456789ABCDEF";
            let wynik = "";
            let l = liczba;
            
            while (l > 0) {
                let reszta = l % 16;
                wynik = znaki[reszta] + wynik;
                l = Math.floor(l / 16);
            }
            
            console.log(wynik);
        }
        
        Szesnastkowy(4096);
        Szesnastkowy(255);
        Szesnastkowy(165);
    </script>
</body>
</html>
