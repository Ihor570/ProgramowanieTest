<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie 4</title>
</head>
<body>
    <script>
        function silnia(n) {
            if (n === 0 || n === 1) {
                return 1;
            }
            return n * silnia(n - 1);
        }
        
        let n = 5;
        console.log("Silnia z " + n + " wynosi: " + silnia(n));
    </script>
</body>
</html>
